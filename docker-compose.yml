services:
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  mysql:
    image: mysql:8.0
    # MySQL 8 默认 max_connections=151；提到 200 给 app/worker 连接池 + SSE 长连接留余量
    # （连接池耗尽事故的生产缓解，配合后端调大 pool/pool_timeout）。
    command: ["--max-connections=200"]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-geo_collab}
      MYSQL_USER: ${MYSQL_USER:-geo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?required}
    # ports:  # 不需要 — app/worker 通过内部网络连 mysql:3306
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  dailyhot-api:
    build: ./services/dailyhot-api
    restart: unless-stopped
    # 镜像内置 NODE_ENV=docker + EXPOSE 6688，容器自启服务；仅内部网络，不映射宿主端口

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      dailyhot-api:
        condition: service_started
    env_file:
      - .env
    environment:
      GEO_DB_HOST: mysql
      GEO_DB_PORT: 3306
      GEO_DB_USER: ${MYSQL_USER:-geo_user}
      GEO_DB_PASS: ${MYSQL_PASSWORD}
      GEO_DB_NAME: ${MYSQL_DATABASE:-geo_collab}
      GEO_DATA_DIR: /app/data
      GEO_NGINX_ACCEL: "1"
      GEO_HOTLIST_API_URL: http://dailyhot-api:6688
      # MCP HTTP-mount(/mcp 网关与 /api/mcp/* 同进程同容器)时 tool handler 的自调用地址。
      # 钉死回环、不依赖 .env：若 .env 误把它写成公网域名，容器向自己的公网域名发请求，
      # 阿里云 ECS 默认不支持发卡回环(hairpin NAT) → 30s 超时。environment 优先级高于 env_file。
      GEO_MCP_INTERNAL_API_URL: http://127.0.0.1:8000
    volumes:
      - app_data:/app/data

  worker:
    build: .
    restart: unless-stopped
    command: sh -c "alembic upgrade head && python -m server.worker.executor"
    # ports:  # noVNC now proxied through nginx, no direct port exposure needed
    #   - "127.0.0.1:6080-6090:6080-6090"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      GEO_DB_HOST: mysql
      GEO_DB_PORT: 3306
      GEO_DB_USER: ${MYSQL_USER:-geo_user}
      GEO_DB_PASS: ${MYSQL_PASSWORD}
      GEO_DB_NAME: ${MYSQL_DATABASE:-geo_collab}
      GEO_DATA_DIR: /app/data
      GEO_PUBLISH_NOVNC_WEB_DIR: /usr/share/novnc
      GEO_PUBLISH_REMOTE_BROWSER_HOST: 0.0.0.0
      GEO_PUBLISH_XVFB_PATH: Xvfb
      GEO_PUBLISH_X11VNC_PATH: x11vnc
      GEO_PUBLISH_WEBSOCKIFY_PATH: websockify
    volumes:
      - app_data:/app/data

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
      - worker
    volumes:
      - app_data:/app_data:ro

volumes:
  mysql_data:
  app_data:
  minio_data:
