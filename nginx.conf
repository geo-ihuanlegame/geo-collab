# Upstream 服务器定义（支持连接复用和 Keep-Alive）
upstream app {
    server app:8000;
    keepalive 16;  # 保持 16 个连接以复用
}

server {
    listen 80;
    resolver 127.0.0.11 valid=30s ipv6=off;
    client_max_body_size 25m;
    # Increase buffer for large uploads (store in memory for better speed)
    client_body_buffer_size 5m;
    client_body_timeout 300s;
    keepalive_timeout 75s;  # 提高 Keep-Alive 超时

    # 前端静态资源（JS/CSS bundle，Vite 构建产物）
    # Vite 在 /assets/ 下输出带哈希文件名的 bundle，可长期缓存
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 入口（所有非 /api/ 路径返回 index.html）
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        # SSE 和流式响应需要关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        # Keep-Alive 优化：复用连接，减少握手开销
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # noVNC WebSocket 代理（必须放在 /novnc/ 静态文件路由之前）
    # noVNC WebSocket proxy for session-specific worker ports.
    location ~ "^/novnc/ws/(?<novnc_port>(?:60[8-9][0-9]|6[1-9][0-9][0-9]|70[0-7][0-9]))/?$" {
        proxy_pass http://worker:$novnc_port/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Legacy noVNC WebSocket path for existing links.
    location /novnc/websockify {
        proxy_pass http://worker:6080/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # noVNC 静态文件（vnc.html, app/, core/, vendor/）
    location /novnc/ {
        alias /usr/share/novnc/;
        try_files $uri $uri/ =404;
    }

    # X-Accel-Redirect 内部路径：FastAPI 鉴权后指向此处，Nginx 直接 sendfile
    # app_data 卷挂载在 /app_data/，对应 GEO_DATA_DIR=/app/data
    location /internal_data/ {
        internal;
        alias /app_data/;
    }
}
