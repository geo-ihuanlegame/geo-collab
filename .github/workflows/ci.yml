name: CI

# 每次 push（main）和 PR 都触发。分支规则 "geo" 要求 backend / frontend 两个必需检查，
# 所以下面必须保留名为 `backend`、`frontend` 的 job 作为必需上下文。
on:
  push:
    branches: [main]
  pull_request:

# 同一分支新 push 进来时，取消上一次还在跑的 CI，省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 改动分类：纯文档改动跳过重活（但 job 仍正常完成并报成功，满足必需检查）──
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'server/**'
              - 'web/**'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'pyproject.toml'
              - 'alembic.ini'
              - '.github/workflows/**'
              # 部署/构建相关：改这些不再算「纯文档」，否则会零验证直接报绿合并
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.dockerignore'

  # ── 后端质量门禁：ruff / format / mypy（whole-codebase，不分片，与测试并行）──
  lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Cache mypy
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py312-${{ hashFiles('server/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-py312-
      - name: Ruff lint
        if: needs.changes.outputs.code == 'true'
        run: ruff check server/
      - name: Ruff format check
        if: needs.changes.outputs.code == 'true'
        run: ruff format --check server/
      - name: Mypy
        if: needs.changes.outputs.code == 'true'
        run: mypy server/app

  # ── 后端测试：4 片并行，各自带独立 MySQL service（天然隔离）。pytest-split 均分。──
  # 本 job 的 check 名是 "backend-tests (N)"，非必需；必需的 "backend" 由下方聚合 job 产出。
  backend-tests:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpw
          MYSQL_DATABASE: geo_test   # 测试库名必须含 "test"（项目安全检查）
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptestpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest (shard ${{ matrix.shard }}/4)
        if: needs.changes.outputs.code == 'true'
        env:
          GEO_TEST_DATABASE_URL: mysql+pymysql://root:testpw@127.0.0.1:3306/geo_test
          GEO_JWT_SECRET: ci-test-secret-not-for-prod
          GEO_DATA_DIR: ${{ runner.temp }}/geo-data
        # --timeout：任何测试卡死 >120s 直接失败（线程类测试的安全网）
        # --splits/--group：把测试集均分到 4 片，本 job 只跑第 N 片
        run: pytest server/tests/ -q --timeout=120 --splits 4 --group ${{ matrix.shard }}

  # ── 必需检查 "backend"：聚合 lint + 4 个测试分片的结果。任一失败则失败。──
  backend:
    needs: [changes, lint, backend-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on lint + test shards
        run: |
          echo "lint=${{ needs.lint.result }}  backend-tests=${{ needs.backend-tests.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "::error::backend gate failed (lint or one of the test shards did not succeed)"
            exit 1
          fi
          echo "backend gate passed"

  # ── 前端：类型检查 + 构建（必需检查）。纯文档改动时跳过重活但 job 仍报成功。──
  frontend:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile
      # 非阻塞：清掉存量 lint error 后，删掉 continue-on-error 即变硬门禁
      - name: ESLint (non-blocking)
        if: needs.changes.outputs.code == 'true'
        continue-on-error: true
        run: pnpm --filter @geo/web lint
      - name: Typecheck
        if: needs.changes.outputs.code == 'true'
        run: pnpm --filter @geo/web typecheck
      - name: Build
        if: needs.changes.outputs.code == 'true'
        run: pnpm --filter @geo/web build

  # ── 依赖安全扫描：pip-audit（后端）+ pnpm audit（前端）。非阻塞、纯观察。──
  # 刻意不进必需检查、不参与 backend/frontend 门禁：发现 CVE 只在日志里告警，
  # 不卡合并。等噪声摸清、确定要硬卡时，再去掉 continue-on-error 并加进 ruleset。
  security-audit:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        if: needs.changes.outputs.code == 'true'
        run: python -m pip install --upgrade pip pip-audit
      - name: pip-audit (non-blocking)
        if: needs.changes.outputs.code == 'true'
        continue-on-error: true
        run: pip-audit -r requirements.txt -r requirements-dev.txt
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install web deps
        if: needs.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (non-blocking)
        if: needs.changes.outputs.code == 'true'
        continue-on-error: true
        run: pnpm audit --audit-level moderate
